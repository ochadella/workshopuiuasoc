<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>
    Register – NovelCraft
  </title>

  <!-- CSS -->
  <link rel="stylesheet"
        href="../assets/css/style.css" />

  <link rel="stylesheet"
        href="../assets/css/auth.css" />

  <link rel="stylesheet"
        href="../assets/css/responsive.css" />

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />

</head>

<body class="auth-body">

  <!-- BG -->
  <div class="auth-bg-glow glow-1"></div>
  <div class="auth-bg-glow glow-2"></div>

  <!-- AUTH -->
  <section class="auth-section">

    <!-- LEFT -->
    <div class="auth-left">

      <a href="../index.html"
         class="auth-logo">

        <span class="brand-n">
          N
        </span>

        <span class="brand-rest">
          ovelCraft
        </span>

      </a>

      <p class="auth-eyebrow">
        ✦ Start Your Journey
      </p>

      <h1 class="auth-title">

        BUAT <br>

        <em>AKUN BARU</em>

      </h1>

      <p class="auth-desc">

        Bergabunglah bersama ribuan penulis Indonesia dan mulai perjalanan publikasi novelmu hari ini.

      </p>

      <div class="auth-features">

        <div class="af-item">
          ✦ Dashboard Penulis
        </div>

        <div class="af-item">
          ✦ Submit Naskah
        </div>

        <div class="af-item">
          ✦ Mentoring & Workshop
        </div>

        <div class="af-item">
          ✦ Tracking Progress
        </div>

      </div>

    </div>

    <!-- RIGHT -->
    <div class="auth-right">

      <div class="auth-card">

        <p class="auth-card-sub">
          Register Account
        </p>

        <h2 class="auth-card-title">
          Daftar Sekarang
        </h2>

        <!-- ALERT -->
        <div id="registerAlert"
             class="auth-alert">
        </div>

        <!-- FORM -->
        <form class="auth-form"
              id="registerForm">

          <!-- NAMA -->
          <div class="form-group">

            <label>
              Nama Lengkap
            </label>

            <input type="text"
                   id="fullName"
                   placeholder="Nama lengkap kamu" />

            <small class="field-error"></small>

          </div>

          <!-- EMAIL -->
          <div class="form-group">

            <label>
              Email
            </label>

            <input type="email"
                   id="email"
                   placeholder="email@gmail.com" />

            <small class="field-error"></small>

          </div>

          <!-- PASSWORD -->
          <div class="form-group">

            <label>
              Password
            </label>

            <div class="pw-wrap">

              <input type="password"
                     id="password"
                     placeholder="Masukkan password" />

              <button type="button"
                      class="pw-toggle">

                👁

              </button>

            </div>

            <small class="field-error"></small>

            <div class="pw-strength">

              <div class="pw-strength-bar">
                <div class="pw-strength-fill"></div>
              </div>

              <span class="pw-strength-text">
                Lemah
              </span>

            </div>

          </div>

          <!-- CONFIRM -->
          <div class="form-group">

            <label>
              Konfirmasi Password
            </label>

            <input type="password"
                   id="confirmPassword"
                   placeholder="Ulangi password" />

            <small class="field-error"></small>

          </div>

          <!-- TERMS -->
          <label class="remember-wrap">

            <input type="checkbox"
                   id="termsCheck" />

            <span>
              Saya menyetujui syarat & ketentuan NovelCraft
            </span>

          </label>

          <!-- BUTTON -->
          <button type="submit"
                  class="btn-primary btn-full">

            Buat Akun ✦

          </button>

        </form>

        <!-- SWITCH -->
        <p class="auth-switch">

          Sudah punya akun?

          <a href="login.html">
            Login
          </a>

        </p>

      </div>

    </div>

  </section>

  <!-- JS -->
  <script src="../assets/js/script.js"></script>

  <script src="../assets/js/auth.js"></script>

</body>

</html>
