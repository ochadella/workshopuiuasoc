<script>
  // ============================================
  // AUTO ACTIVE STATE — set class "active" sesuai
  // halaman yang sedang dibuka, dan sync badge keranjang
  // dengan localStorage agar selalu konsisten.
  // ============================================
  (function () {
    const currentPage = location.pathname.split('/').pop() || 'dashboard-user.html';
    document.querySelectorAll('#userSidebar .sidebar-link[data-page]').forEach(link => {
      if (link.dataset.page === currentPage) {
        link.classList.add('active');
      } else {
        link.classList.remove('active');
      }
    });

    // Sinkronkan badge jumlah item keranjang
    try {
      const cart = JSON.parse(localStorage.getItem('novelCart') || '[]');
      const count = cart.reduce((s, i) => s + i.qty, 0);
      const badge = document.getElementById('sidebarCartCount');
      if (badge) badge.textContent = count > 0 ? count : '';
    } catch (e) {}

    // Sinkronkan badge jumlah revisi yang perlu aksi ("needrev")
    try {
      const revisi = JSON.parse(localStorage.getItem('revisiNaskah') || 'null');
      if (revisi) {
        const needAction = revisi.filter(r => r.status === 'needrev').length;
        const badge = document.getElementById('sidebarRevisiCount');
        if (badge) badge.textContent = needAction;
      }
    } catch (e) {}
  })();
</script>
